<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Everything Factory Tracker V2</title>
<style>
body{margin:0;background:#020817;color:#e5e7eb;font-family:Inter,Arial,sans-serif}
.container{max-width:1400px;margin:auto;padding:20px}
.card,details{background:#111827;border-radius:16px;padding:16px;margin-bottom:12px}
summary{cursor:pointer;font-size:1.1rem;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
input{width:100%;padding:8px;background:#0f172a;color:white;border:1px solid #475569;border-radius:8px}
.small{color:#94a3b8;font-size:.85em}
.bar{height:10px;background:#334155;border-radius:99px;overflow:hidden;margin-top:8px}
.fill{height:100%;background:linear-gradient(90deg,#22c55e,#3b82f6)}
@media(max-width:768px){.grid,.stats{grid-template-columns:1fr}}
</style></head><body>
<div class="container">
<h1>Everything Factory Tracker V2</h1>
<div class="card"><input id="search" placeholder="Search upgrades..."></div>
<div class="card stats" id="totals"></div>
<div class="card stats">
<div><b>Stardust/Rebirth</b><input id="spr" type="number" value="1"></div>
<div><b>Seconds/Rebirth</b><input id="sec" type="number" value="1"></div>
<div><b>Rebirths Needed</b><div id="reb"></div></div>
<div><b>AFK Time</b><div id="afk"></div></div>
</div>
<div id="shops"></div>
</div>
<script>
const upgrades=[
{c:"Gem Shop",cur:"Gems",n:"Spawn Rate",m:20,f:l=>3*Math.pow(1.6,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Factory Luck",m:90,f:l=>5*Math.pow(1.065,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Mutation Rate",m:20,f:l=>5*Math.pow(1.4,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Mutation Luck",m:150,f:l=>3*Math.pow(1.0568,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Ore Limit",m:25,f:l=>5*Math.pow(1.5,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Furnace Bank Size",m:45,f:l=>5*Math.pow(1.15,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Offline Earnings",m:20,f:l=>15*Math.pow(1.3,l-1)},

{c:"Stardust Shop",cur:"Stardust",n:"Gem Chance",m:40,f:l=>2*l},
{c:"Stardust Shop",cur:"Stardust",n:"More Mutation Luck",m:75,f:l=>{let c=5;for(let i=2;i<=l;i++)c+=Math.ceil(i/10);return c;}},
{c:"Stardust Shop",cur:"Stardust",n:"Plot Size",m:10,f:l=>6*l},
{c:"Stardust Shop",cur:"Stardust",n:"Walk Speed",m:20,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",n:"Level Preservation",m:25,f:l=>2*l*l},
{c:"Stardust Shop",cur:"Stardust",n:"Extra Permanent Pick",m:1,f:l=>1000},
{c:"Stardust Shop",cur:"Stardust",n:"Scrap Boost",m:20,f:l=>50*Math.pow(1.475,l-1)},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Dropper Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Multiplier Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Adder Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Furnace Mutation Boost",m:5000,f:l=>l},

{c:"Junkyard Shop",cur:"Gems",n:"Junkyard Luck",m:58,f:l=>1000*Math.pow(1.1,l-1)},
{c:"Junkyard Shop",cur:"Gems",n:"Faster Restock",m:20,f:l=>100*Math.pow(1.5107,l-1)},
{c:"Junkyard Shop",cur:"Stardust",n:"More Stock",m:12,f:l=>1000*Math.pow(1.7,l-1)},
{c:"Junkyard Shop",multi:true,n:"Junkyard Gold",m:30,fr:l=>170*Math.pow(1.13,l-1),fs:l=>42.6*Math.pow(1.13,l-1),ff:l=>8.5*Math.pow(1.13,l-1)},

{c:"Scrap Shop",cur:"Rusty Scrap",n:"Rusty Luck",m:40,f:l=>20*Math.pow(1.1765,l-1)},
{c:"Scrap Shop",cur:"Rusty Scrap",n:"Rust-powered Dust",m:50,f:l=>40*Math.pow(1.132,l-1)},
{c:"Scrap Shop",cur:"Rusty Scrap",n:"Rusty Cap",m:20,f:l=>50*Math.pow(1.338,l-1)},
{c:"Scrap Shop",cur:"Sturdy Scrap",n:"Sturdy Luck",m:25,f:l=>10*Math.pow(1.29,l-1)},
{c:"Scrap Shop",cur:"Sturdy Scrap",n:"Salvaged Slot",m:1,f:l=>2500},
{c:"Scrap Shop",cur:"Sturdy Scrap",n:"Sturdy Banks",m:20,f:l=>20*Math.pow(1.239,l-1)},
{c:"Scrap Shop",cur:"Flawless Scrap",n:"Flawless Luck",m:15,f:l=>5*Math.pow(1.4,l-1)},
{c:"Scrap Shop",cur:"Flawless Scrap",n:"Golden Touch",m:10,f:l=>25*Math.pow(1.475,l-1)},
{c:"Scrap Shop",cur:"Flawless Scrap",n:"Flawless Banks",m:20,f:l=>8*Math.pow(1.25,l-1)}
];
let save=JSON.parse(localStorage.getItem("efv2save")||"{}");
const cum=(u,l)=>{let t=0;for(let i=1;i<=l;i++){if(u.multi)t+=0;else t+=u.f(i)}return t}
const fmt=n=>Math.round(n).toLocaleString();
function timeFmt(s){let h=s/3600,d=Math.floor(h/24);h-=d*24;return `${d}d ${h.toFixed(1)}h`}
function render(){
const q=document.getElementById('search').value.toLowerCase();
const shops={}; upgrades.forEach((u,i)=>{if(q && !u.n.toLowerCase().includes(q)) return;(shops[u.c]??=[]).push([u,i]);});
let out='';
for(const [shop,list] of Object.entries(shops)){
 out+=`<details open><summary>${shop}</summary><div class="grid">`;
 list.forEach(([u,i])=>{
 const lvl=save[i]||0;
 let rem='';
 if(u.multi){
 rem=`Rusty ${fmt(sum(u.fr,lvl,u.m))}<br>Sturdy ${fmt(sum(u.fs,lvl,u.m))}<br>Flawless ${fmt(sum(u.ff,lvl,u.m))}`;
 } else {
 rem=fmt(cum(u,u.m)-cum(u,lvl));
 }
 const pct=(lvl/u.m*100).toFixed(1);
 out+=`<div class="card"><b>${u.n}</b><div class="small">${u.multi?'Multi Currency':u.cur}</div>
 <input type="number" min="0" max="${u.m}" value="${lvl}" data-i="${i}">
 <div>Max ${u.m}</div><div>Remaining: ${rem}</div>
 <div class="bar"><div class="fill" style="width:${pct}%"></div></div>${pct}%</div>`;
 });
 out+='</div></details>';
}
document.getElementById('shops').innerHTML=out;
document.querySelectorAll('[data-i]').forEach(e=>e.oninput=x=>{save[x.target.dataset.i]=+x.target.value;localStorage.setItem('efv2save',JSON.stringify(save));render();update();});
update();
}
function sum(fn,l,m){let t=0;for(let i=l+1;i<=m;i++)t+=fn(i);return t}
function update(){
const t={Gems:0,Stardust:0,'Rusty Scrap':0,'Sturdy Scrap':0,'Flawless Scrap':0}; let afk=0;
upgrades.forEach((u,i)=>{
 let lvl=save[i]||0;
 if(u.multi){
 t['Rusty Scrap']+=sum(u.fr,lvl,u.m);
 t['Sturdy Scrap']+=sum(u.fs,lvl,u.m);
 t['Flawless Scrap']+=sum(u.ff,lvl,u.m);
 } else {
 let rem=cum(u,u.m)-cum(u,lvl);
 t[u.cur]=(t[u.cur]||0)+rem;
 if(u.afk) afk+=rem;
 }
});
document.getElementById('totals').innerHTML=Object.entries(t).map(([k,v])=>`<div><b>${k}</b><div>${fmt(v)}</div></div>`).join('');
 const reb=Math.ceil(afk/(+spr.value||1));
 rebirths=reb;
 document.getElementById('reb').textContent=fmt(reb);
 document.getElementById('afk').textContent=timeFmt(reb*(+sec.value||1));
}
search.oninput=render; spr.oninput=update; sec.oninput=update; render();
</script></body></html>
