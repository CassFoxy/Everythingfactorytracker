<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Everything Factory Tracker V2 Release</title>
<style>
:root{--text:#e5e7eb;--muted:#94a3b8;--accent:#3b82f6;--good:#22c55e}
*{box-sizing:border-box} body{margin:0;color:var(--text);font-family:Inter,Arial,sans-serif;background:#020817}
body:before{content:"";position:fixed;inset:-50px;background:url('new_goated_thumbnail.png') center/cover no-repeat;filter:blur(8px);transform:scale(1.05);z-index:-2}
body:after{content:"";position:fixed;inset:0;background:rgba(2,8,20,.78);z-index:-1}
.container{max-width:1500px;margin:auto;padding:20px}
.logo{display:block;margin:auto;max-width:900px;width:95%}
.card,details{
    background:rgba(4,12,28,.6);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:12px;
    margin-bottom:12px;
}
.upgrade-card{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.upgrade-title{
    font-size:1.15rem;
    font-weight:700;
}

    .upgrade-card.gems .upgrade-title{
    color:#67d9ff;
    text-shadow:0 0 8px rgba(103,217,255,.35);
}

.upgrade-card.stardust .upgrade-title{
    color:#b57cff;
    text-shadow:0 0 8px rgba(181,124,255,.35);
}

.upgrade-card.rusty .upgrade-title{
    color:#d39a52;
    text-shadow:0 0 8px rgba(211,154,82,.35);
}

.upgrade-card.sturdy .upgrade-title{
    color:#cfd8e3;
    text-shadow:0 0 8px rgba(207,216,227,.35);
}

.upgrade-card.flawless .upgrade-title{
    color:#ffd84d;
    text-shadow:0 0 8px rgba(255,216,77,.35);
}

.currency-label{
    color:var(--muted);
    margin-top:-6px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.cost-section{
    margin-top:8px;
    line-height:1.8;
}

.progress-section{
    margin-top:8px;
}

.progress-text{
    text-align:center;
    color:var(--muted);
    margin-top:4px;
}

.target-btn{
    margin-top:12px;
}
 .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:12px;
}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,button{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #475569;
    background:#0f172a;
    color:#fff;
}
 .bar{
    height:8px;
    background:#334155;
    border-radius:999px;
    overflow:hidden;
}
.fill{
    height:100%;
    background:linear-gradient(
        90deg,
        var(--good),
        var(--accent)
    );

    transition:
        width .25s ease;
}

/* Currency Cards */

.currency-card{

    display:flex;
    align-items:center;
    gap:12px;

    transition:
        transform .2s ease,
        box-shadow .2s ease;

}

    .currency-card.gems{
    border-color:rgba(103,217,255,.35);

    background:
        linear-gradient(
            135deg,
            rgba(103,217,255,.06),
            rgba(4,12,28,.65)
        );
}

.currency-card.stardust{
    border-color:rgba(181,124,255,.35);

    background:
        linear-gradient(
            135deg,
            rgba(181,124,255,.06),
            rgba(4,12,28,.65)
        );
}

.currency-card.rusty{
    border-color:rgba(211,154,82,.35);

    background:
        linear-gradient(
            135deg,
            rgba(211,154,82,.06),
            rgba(4,12,28,.65)
        );
}

.currency-card.sturdy{
    border-color:rgba(207,216,227,.35);

    background:
        linear-gradient(
            135deg,
            rgba(207,216,227,.06),
            rgba(4,12,28,.65)
        );
}

.currency-card.flawless{
    border-color:rgba(255,216,77,.35);

    background:
        linear-gradient(
            135deg,
            rgba(255,216,77,.06),
            rgba(4,12,28,.65)
        );
}

    .currency-card:hover{
    transform:translateY(-2px);
}

.currency-card.gems:hover{
    box-shadow:0 0 20px rgba(103,217,255,.18);
}

.currency-card.stardust:hover{
    box-shadow:0 0 20px rgba(181,124,255,.18);
}

.currency-card.rusty:hover{
    box-shadow:0 0 20px rgba(211,154,82,.18);
}

.currency-card.sturdy:hover{
    box-shadow:0 0 20px rgba(207,216,227,.18);
}

.currency-card.flawless:hover{
    box-shadow:0 0 20px rgba(255,216,77,.18);
}

.currency-icon{
    width:42px;
    height:42px;
    object-fit:contain;
}
.currency-name{
    font-size:.9rem;
    font-weight:600;
}

.gems{
    color:#67d9ff;
    text-shadow:0 0 8px rgba(103,217,255,.4);
}

.stardust{
    color:#b57cff;
    text-shadow:0 0 8px rgba(181,124,255,.4);
}

.rusty{
    color:#d39a52;
    text-shadow:0 0 8px rgba(211,154,82,.35);
}

.sturdy{
    color:#cfd8e3;
    text-shadow:0 0 8px rgba(207,216,227,.35);
}

.flawless{
    color:#ffd84d;
    text-shadow:0 0 8px rgba(255,216,77,.4);
}

    /* Currency Themed Upgrade Cards */

.upgrade-card.gems{
    border-color:rgba(103,217,255,.35);

    background:
        linear-gradient(
            135deg,
            rgba(103,217,255,.06),
            rgba(4,12,28,.65)
        );
}

.upgrade-card.stardust{
    border-color:rgba(181,124,255,.35);

    background:
        linear-gradient(
            135deg,
            rgba(181,124,255,.06),
            rgba(4,12,28,.65)
        );
}

.upgrade-card.rusty{
    border-color:rgba(211,154,82,.35);

    background:
        linear-gradient(
            135deg,
            rgba(211,154,82,.06),
            rgba(4,12,28,.65)
        );
}

.upgrade-card.sturdy{
    border-color:rgba(207,216,227,.35);

    background:
        linear-gradient(
            135deg,
            rgba(207,216,227,.06),
            rgba(4,12,28,.65)
        );
}

.upgrade-card.flawless{
    border-color:rgba(255,216,77,.35);

    background:
        linear-gradient(
            135deg,
            rgba(255,216,77,.06),
            rgba(4,12,28,.65)
        );
}

    .upgrade-card{
    transition:
        transform .2s ease,
        box-shadow .2s ease,
        border-color .2s ease;
}

    /* Completion Overview */
    
.completion-card{

    border-color:
        rgba(59,130,246,.25);

    background:
        linear-gradient(
            135deg,
            rgba(59,130,246,.08),
            rgba(4,12,28,.65)
        );

    align-self:start;

    height:auto;

}

.completion-title{

    color:#93c5fd;

    text-shadow:
        0 0 12px
        rgba(147,197,253,.35);

}

/* Completion Rows */

.shop-complete{

    display:flex;
    justify-content:space-between;

    margin-top:8px;

    color:var(--muted);

}

.shop-complete span{

    color:#60a5fa;

    font-weight:700;

}

    .completion-card{
    transition:
        transform .2s ease,
        box-shadow .2s ease;
}

.completion-card:hover{
    transform:translateY(-2px);

    box-shadow:
        0 0 20px
        rgba(59,130,246,.18);
}

.upgrade-card:hover{
    transform:translateY(-3px);
}

.upgrade-card.gems:hover{
    box-shadow:
        0 0 20px rgba(103,217,255,.18);
}

.upgrade-card.stardust:hover{
    box-shadow:
        0 0 20px rgba(181,124,255,.18);
}

.upgrade-card.rusty:hover{
    box-shadow:
        0 0 20px rgba(211,154,82,.18);
}

.upgrade-card.sturdy:hover{
    box-shadow:
        0 0 20px rgba(207,216,227,.18);
}

.upgrade-card.flawless:hover{
    box-shadow:
        0 0 20px rgba(255,216,77,.18);
}

.currency-value{
    font-size:1.2rem;
    font-weight:700;
}

.dashboard-row{

    display:grid;

    grid-template-columns:
        0.8fr
        1.2fr;

    gap:12px;

    align-items:start;

}

.afk-card{

    border-color:
        rgba(181,124,255,.25);

    background:
        linear-gradient(
            135deg,
            rgba(181,124,255,.08),
            rgba(4,12,28,.65)
        );

}

    .afk-grid{

    display:grid;

    grid-template-columns:
        1fr
        1fr;

    gap:16px;

}

.afk-grid b{

    display:block;

    margin-bottom:6px;

}

    .afk-result{

    font-size:1.35rem;

    font-weight:700;

    color:#b57cff;

    text-shadow:
        0 0 10px
        rgba(181,124,255,.35);

}

@media(max-width:900px){

    .dashboard-row{

        grid-template-columns:
            1fr;

    }

}

/* Currency Labels */

.currency-label{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--muted);
}

.mini-currency-icon{
    width:22px;
    height:22px;
    object-fit:contain;
}

.links{
    position:fixed;
    right:20px;
    top:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.links img{
    width:60px;
    border-radius:14px;
}

summary{
    cursor:pointer;
    font-weight:700;
    font-size:1.15rem;
    padding:4px 0;
}
@media(max-width:768px){.grid,.stats{grid-template-columns:1fr}.links{position:static;flex-direction:row;justify-content:center}}
</style>
</head>
<body>
<div class="container">
<img src="community_logo.png" class="logo">
<div class="links">
<img src="fandom.png"><img src="Reddit_Logo.png"><img src="DiscordLogo.png">
</div>

<div class="card"><input id="search" placeholder="Search upgrades..."></div>

<div class="dashboard-row">

    <div class="card completion-card">
        <h3 class="completion-title">
            Completion Overview
        </h3>

        <div id="completion"></div>
    </div>

<div class="card afk-card">

    <h3 class="completion-title">
        ✨ AFK Calculator
    </h3>

    <div class="afk-grid">

            <div>
                <b>Stardust/Rebirth</b>
                <input id="spr" value="1" type="number">
            </div>

            <div>
                <b>Seconds/Rebirth</b>
                <input id="sec" value="1" type="number">
            </div>

            <div>
                <b>Rebirths Needed</b>
<div
    id="reb"
    class="afk-result">

    0

</div>
            </div>

            <div>
                <b>AFK Time</b>
<div
    id="afk"
    class="afk-result">

    0

</div>
            </div>

        </div>

    </div>

</div>

<div
    id="totals"
    class="stats">

</div>

<div class="card stats">

    <button onclick="setAllTargetsToMax()">
        Set All Targets To Max
    </button>

    <button onclick="resetProgressOnly()">
        Reset Progress
    </button>

    <button onclick="fullReset()">
        Full Reset
    </button>

</div>
<div id="shops"></div>
</div>

<script>
const upgrades=[
{c:"Gem Shop",cur:"Gems",n:"Spawn Rate",m:20,f:l=>3*Math.pow(1.6,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Factory Luck",m:90,f:l=>5*Math.pow(1.065,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Mutation Rate",m:20,f:l=>5*Math.pow(1.4,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Mutation Luck",m:150,f:l=>3*Math.pow(1.0568,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Ore Limit",m:25,f:l=>5*Math.pow(1.5,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Furnace Bank Size",m:45,f:l=>5*Math.pow(1.15,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Offline Earnings",m:20,f:l=>15*Math.pow(1.3,l-1)},
{c:"Stardust Shop",cur:"Stardust",n:"Gem Chance",m:40,f:l=>2*l},
{c:"Stardust Shop",cur:"Stardust",n:"More Mutation Luck",m:75,f:l=>{let c=5;for(let i=2;i<=l;i++)c+=Math.ceil(i/10);return c}},
{c:"Stardust Shop",cur:"Stardust",n:"Plot Size",m:10,f:l=>6*l},
{c:"Stardust Shop",cur:"Stardust",n:"Walk Speed",m:20,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",n:"Level Preservation",m:25,f:l=>2*l*l},
{c:"Stardust Shop",cur:"Stardust",n:"Extra Permanent Pick",m:1,f:l=>1000},
{c:"Stardust Shop",cur:"Stardust",n:"Scrap Boost",m:20,f:l=>50*Math.pow(1.475,l-1)},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Dropper Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Multiplier Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Adder Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Furnace Mutation Boost",m:5000,f:l=>l}
 ,
{c:"Junkyard Shop",cur:"Gems",n:"Junkyard Luck",m:58,f:l=>1000*Math.pow(1.1,l-1)},
{c:"Junkyard Shop",cur:"Gems",n:"Faster Restock",m:20,f:l=>100*Math.pow(1.5107,l-1)},
{c:"Junkyard Shop",cur:"Stardust",n:"More Stock",m:12,f:l=>1000*Math.pow(1.7,l-1)}
 ,
{c:"Scrap Shop",cur:"Rusty Scrap",n:"Rusty Luck",m:40,f:l=>20*Math.pow(1.1765,l-1)},
{c:"Scrap Shop",cur:"Rusty Scrap",n:"Rust-powered Dust",m:50,f:l=>40*Math.pow(1.132,l-1)},
{c:"Scrap Shop",cur:"Rusty Scrap",n:"Rusty Cap",m:20,f:l=>50*Math.pow(1.338,l-1)},

{c:"Scrap Shop",cur:"Sturdy Scrap",n:"Sturdy Luck",m:25,f:l=>10*Math.pow(1.29,l-1)},
{c:"Scrap Shop",cur:"Sturdy Scrap",n:"Salvaged Slot",m:1,f:l=>2500},
{c:"Scrap Shop",cur:"Sturdy Scrap",n:"Sturdy Banks",m:20,f:l=>20*Math.pow(1.239,l-1)},

{c:"Scrap Shop",cur:"Flawless Scrap",n:"Flawless Luck",m:15,f:l=>5*Math.pow(1.4,l-1)},
{c:"Scrap Shop",cur:"Flawless Scrap",n:"Golden Touch",m:10,f:l=>25*Math.pow(1.475,l-1)},
{c:"Scrap Shop",cur:"Flawless Scrap",n:"Flawless Banks",m:20,f:l=>8*Math.pow(1.25,l-1)}
];
let save=JSON.parse(localStorage.getItem("efv2release")||"{}");

let openShops =
    JSON.parse(
        localStorage.getItem("efv2_openShops")
    ) || {

        "Gem Shop": false,
        "Stardust Shop": false,
        "Junkyard Shop": false,
        "Scrap Shop": false

    };
const fmt=n=>Math.round(n).toLocaleString();
const costBetween=(u,a,b)=>{let t=0;for(let i=a+1;i<=b;i++)t+=u.f(i);return t}
function setAllTargetsToMax(){

    upgrades.forEach((u,i)=>{

        save[i] ??= {
            current:0,
            target:u.m
        };

        save[i].target = u.m;

    });

    persist();
    render();

}

function resetProgressOnly(){

    upgrades.forEach((u,i)=>{

        save[i] ??= {
            current:0,
            target:u.m
        };

        save[i].current = 0;

    });

    persist();
    render();

}
function fullReset(){

    upgrades.forEach((u,i)=>{

        save[i]={
            current:0,
            target:u.m
        };

    });

    persist();

    render();

}
function persist(){localStorage.setItem("efv2release",JSON.stringify(save))}
function render(){
let q=search.value.toLowerCase(),groups={};
upgrades.forEach((u,i)=>{if(q&&!u.n.toLowerCase().includes(q))return;(groups[u.c]??=[]).push([u,i])});
let html=''; let shopProg={};
for(let [cat,list] of Object.entries(groups)){
 let avg=0;
html+=`
<details
    data-shop="${cat}"
    ${openShops[cat] ? "open" : ""}>

    <summary>
        ${cat} (${list.length} upgrades)
    </summary>

    <div class="grid">
`;
 list.forEach(([u,i])=>{
  let s=save[i]||{current:0,target:u.m}; let t=Math.max(s.current,Math.min(u.m,s.target)); avg+=s.current/u.m;
html+=`
<div class="
    card
    upgrade-card

    ${
        u.cur==="Gems"
        ? "gems"

        : u.cur==="Stardust"
        ? "stardust"

        : u.cur==="Rusty Scrap"
        ? "rusty"

        : u.cur==="Sturdy Scrap"
        ? "sturdy"

        : "flawless"
    }
">

    <div class="upgrade-title">${u.n}</div>

<div class="
    currency-label

    ${
        u.cur==="Gems"
        ? "gems"

        : u.cur==="Stardust"
        ? "stardust"

        : u.cur==="Rusty Scrap"
        ? "rusty"

        : u.cur==="Sturdy Scrap"
        ? "sturdy"

        : "flawless"
    }
">

    <img
        src="${
            u.cur==="Gems"
            ? "Gem.png"

            : u.cur==="Stardust"
            ? "Dust.png"

            : u.cur==="Rusty Scrap"
            ? "LowScrap.png"

            : u.cur==="Sturdy Scrap"
            ? "MidScrap.png"

            : "HighScrap.png"
        }"
        class="mini-currency-icon">

    ${u.cur}

</div>

    <div class="input-group">
        <label>Current Level</label>
<input
    data-i="${i}"
    data-k="current"
    type="number"
    min="0"
    max="${u.m}"
    value="${s.current}">
    </div>

    <div class="input-group">
        <label>Target Level</label>
<input
    data-i="${i}"
    data-k="target"
    type="number"
    min="0"
    max="${u.m}"
    value="${t}">
    </div>

    <div>
        Max Level: ${u.m}
    </div>

    <div class="cost-section">
<div>
    <strong>Cost To Target:</strong>
    <span id="cost-target-${i}">
        ${fmt(costBetween(u,s.current,t))}
    </span>
</div>

<div>
    <strong>Cost To Max:</strong>
    <span id="cost-max-${i}">
        ${fmt(costBetween(u,s.current,u.m))}
    </span>
</div>
    </div>

    <div class="progress-section">
<div class="bar">
    <div
        id="bar-${i}"
        class="fill"
        style="width:${(s.current/u.m*100)}%">
    </div>
</div>

<div
    id="progress-${i}"
    class="progress-text">

    ${(s.current/u.m*100).toFixed(1)}% Complete

</div>
    </div>

<button
    class="target-btn"
    onclick="
        save[${i}] ??= {
            current:0,
            target:${u.m}
        };

        save[${i}].target = ${u.m};

        persist();

        render();
    ">

    Target = Max

</button>

</div>
`;
 });
 shopProg[cat]=(avg/list.length*100).toFixed(1);
 html+='</div></details>';
}
shops.innerHTML=html;

document
.querySelectorAll("details[data-shop]")
.forEach(detail => {

    detail.addEventListener("toggle", () => {

        openShops[
            detail.dataset.shop
        ] = detail.open;

        localStorage.setItem(
            "efv2_openShops",
            JSON.stringify(openShops)
        );

    });

});
document.querySelectorAll('[data-i]').forEach(e=>e.oninput=x=>{

    let i=x.target.dataset.i;
    let k=x.target.dataset.k;

    save[i]??={
        current:0,
        target:upgrades[i].m
    };

let value = +x.target.value;

value = Math.max(
    0,
    Math.min(
        value,
        upgrades[i].m
    )
);

save[i][k] = value;
if(
    save[i].target <
    save[i].current
){
    save[i].target =
        save[i].current;

    const targetInput =
        document.querySelector(
            `[data-i="${i}"][data-k="target"]`
        );

    if(targetInput){
        targetInput.value =
            save[i].target;
    }
}

x.target.value = value;

persist();

recalculate();

});
update(shopProg);
}
function recalculate(){

    let groups = {};
    let shopProg = {};

    upgrades.forEach((u,i)=>{

        (groups[u.c] ??= []).push([u,i]);

    });

    for(const [cat,list] of Object.entries(groups)){

        let avg = 0;

        list.forEach(([u,i])=>{

            let s = save[i] || {
                current:0,
                target:u.m
            };

            let t = Math.max(
                s.current,
                Math.min(
                    u.m,
                    s.target
                )
            );

            avg += s.current / u.m;

            const pct =
                (s.current / u.m) * 100;

const bar =
    document.getElementById(`bar-${i}`);

if(bar){
    bar.style.width =
        pct + "%";
}

const progress =
    document.getElementById(`progress-${i}`);

if(progress){
    progress.textContent =
        pct.toFixed(1) +
        "% Complete";
}

const costTarget =
    document.getElementById(`cost-target-${i}`);

if(costTarget){
    costTarget.textContent =
        fmt(
            costBetween(
                u,
                s.current,
                t
            )
        );
}

const costMax =
    document.getElementById(`cost-max-${i}`);

if(costMax){
    costMax.textContent =
        fmt(
            costBetween(
                u,
                s.current,
                u.m
            )
        );
}

        });

        shopProg[cat] =
            (avg / list.length * 100)
            .toFixed(1);

    }

    update(shopProg);

}
function update(shopProg){

let currencyTotals = {
    Gems:0,
    Stardust:0,
    "Rusty Scrap":0,
    "Sturdy Scrap":0,
    "Flawless Scrap":0
};

let afk=0;
let overall=0;
upgrades.forEach((u,i)=>{let s=save[i]||{current:0,target:u.m};let t=Math.max(s.current,Math.min(u.m,s.target));let c=costBetween(u,s.current,t);currencyTotals[u.cur] =
    (currencyTotals[u.cur] || 0) + c;if(u.afk)afk+=c;overall+=s.current/u.m});
const currencyIcons = {

    "Gems":"Gem.png",
    "Stardust":"Dust.png",

    "Rusty Scrap":"LowScrap.png",
    "Sturdy Scrap":"MidScrap.png",
    "Flawless Scrap":"HighScrap.png"

};

document.getElementById("totals").innerHTML =
Object.entries(currencyTotals)
.map(([k,v])=>`

<div class="
    card
    currency-card

    ${
        k==="Gems"
        ? "gems"

        : k==="Stardust"
        ? "stardust"

        : k==="Rusty Scrap"
        ? "rusty"

        : k==="Sturdy Scrap"
        ? "sturdy"

        : "flawless"
    }
">

    <img
        src="${currencyIcons[k]}"
        class="currency-icon">

    <div>

<div class="
    currency-name
    ${
        k==="Gems"
        ? "gems"

        : k==="Stardust"
        ? "stardust"

        : k==="Rusty Scrap"
        ? "rusty"

        : k==="Sturdy Scrap"
        ? "sturdy"

        : "flawless"
    }
">
    ${k}
</div>

        <div class="currency-value">
            ${fmt(v)}
        </div>

    </div>

</div>

`)
.join('');
let reb=Math.ceil(afk/(+spr.value||1)); document.getElementById('reb').textContent=fmt(reb);
let totalSeconds =
    reb * (+sec.value || 1);

let days =
    Math.floor(totalSeconds / 86400);

let hours =
    Math.floor((totalSeconds % 86400) / 3600);

let minutes =
    Math.floor((totalSeconds % 3600) / 60);

let rawHours =
    totalSeconds / 3600;

document.getElementById('afk').textContent =
    `${days}d ${hours}h ${minutes}m (${rawHours.toFixed(1)} hrs)`;
completion.innerHTML = `

<div class="shop-complete">
<strong style="
    color:#93c5fd;
    font-size:1.1rem;
">
    Account Completion
</strong>
    <span>
        ${(overall/upgrades.length*100).toFixed(1)}%
    </span>
</div>

${
    Object.entries(shopProg)
    .map(([k,v])=>`

        <div class="shop-complete">

            ${k}

            <span>
                ${v}%
            </span>

        </div>

    `)
    .join('')
}
`;
}
search.oninput=render; spr.oninput=()=>update({}); sec.oninput=()=>update({});
render();
</script></body></html>
