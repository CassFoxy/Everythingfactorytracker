<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Everything Factory Tracker</title>
<style>
:root{--text:#e5e7eb;--muted:#94a3b8;--accent:#3b82f6;--good:#22c55e}
*{box-sizing:border-box} body{margin:0;color:var(--text);font-family:Inter,Arial,sans-serif;background:#020817}
body:before{content:"";position:fixed;inset:-50px;background:url('new_goated_thumbnail.png') center/cover no-repeat;filter:blur(8px);transform:scale(1.05);z-index:-2}
body:after{content:"";position:fixed;inset:0;background:rgba(2,8,20,.78);z-index:-1}
.container{max-width:1800px;margin:auto;padding:20px}
.logo{display:block;margin:auto;max-width:900px;width:95%}
.card,details{
    background:rgba(4,12,28,.6);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:12px;
    margin-bottom:12px;
}
.upgrade-card{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.upgrade-title{
    font-size:1.15rem;
    font-weight:700;
}

    .upgrade-card.gems .upgrade-title{
    color:#67d9ff;
    text-shadow:0 0 8px rgba(103,217,255,.35);
}

.upgrade-card.stardust .upgrade-title{
    color:#b57cff;
    text-shadow:0 0 8px rgba(181,124,255,.35);
}

.upgrade-card.rusty .upgrade-title{
    color:#d39a52;
    text-shadow:0 0 8px rgba(211,154,82,.35);
}

.upgrade-card.sturdy .upgrade-title{
    color:#cfd8e3;
    text-shadow:0 0 8px rgba(207,216,227,.35);
}

.upgrade-card.flawless .upgrade-title{
    color:#ffd84d;
    text-shadow:0 0 8px rgba(255,216,77,.35);
}

.currency-label{
    color:var(--muted);
    margin-top:-6px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.cost-section{
    margin-top:8px;
    line-height:1.8;
}

.progress-section{
    margin-top:8px;
}

.progress-text{
    text-align:center;
    color:var(--muted);
    margin-top:4px;
}

.target-btn{
    margin-top:12px;
}
 .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:12px;
}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,button{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #475569;
    background:#0f172a;
    color:#fff;
}
 .bar{
    height:8px;
    background:#334155;
    border-radius:999px;
    overflow:hidden;
}
.fill{
    height:100%;
    background:linear-gradient(
        90deg,
        var(--good),
        var(--accent)
    );

    transition:
        width .25s ease;
}

.currency-card{

    align-items:center;
    gap:12px;

    transition:
        transform .2s ease,

}

    .currency-card.gems{

        linear-gradient(
            135deg,
            rgba(103,217,255,.06),

}

.currency-card.stardust{
    border-color:rgba(181,124,255,.35);

        linear-gradient(
            135deg,

}

.currency-card.rusty{
    border-color:rgba(211,154,82,.35);

    background:
        linear-gradient(
            135deg,

}

.currency-card.sturdy{

}

.currency-card.gems:hover{

}

.currency-card.stardust:hover{
    box-shadow:0 0 20px rgba(181,124,255,.18);
}

.currency-card.rusty:hover{
    box-shadow:0 0 20px rgba(211,154,82,.18);
}

.currency-card.sturdy:hover{
    box-shadow:0 0 20px rgba(207,216,227,.18);
}

.currency-card.flawless:hover{

.currency-icon{

}
.currency-name{

}

.gems{

}

.stardust{
    color:#b57cff;
    text-shadow:0 0 8px rgba(181,124,255,.4);
}

.rusty{
    color:#d39a52;
    text-shadow:0 0 8px rgba(211,154,82,.35);
}

.sturdy{
    color:#cfd8e3;
    text-shadow:0 0 8px rgba(207,216,227,.35);
}

.flawless{
    color:#ffd84d;
    text-shadow:0 0 8px rgba(255,216,77,.4);
}

}

}

.multi-cost-row.flawless{

}
details{

}

}

details[open][data-shop="Junkyard Shop"]{

    box-shadow:

}

details[data-shop="Stardust Shop"]:hover{

}

details[data-shop="Junkyard Shop"]:hover{

.upgrade-card.gems{
    border-color:rgba(103,217,255,.35);

    background:
        linear-gradient(
            135deg,
            rgba(103,217,255,.06),

}

.upgrade-card.stardust{
    border-color:rgba(181,124,255,.35);

        linear-gradient(
            135deg,

}

.upgrade-card.rusty{
    border-color:rgba(211,154,82,.35);

        linear-gradient(

}

.upgrade-card.sturdy{

.upgrade-card.flawless{

    .upgrade-card{
    transition:
        transform .2s ease,

    /* Completion Overview */
    
.completion-card{

    border-color:
        rgba(59,130,246,.25);

    background:
        linear-gradient(
            135deg,
            rgba(59,130,246,.08),
            rgba(4,12,28,.65)

    align-self:start;

    height:auto;

}

.completion-title{

    color:#93c5fd;

    text-shadow:
        0 0 12px

}

/* Completion Rows */

.shop-complete{

    display:flex;
    justify-content:space-between;

    margin-top:8px;

    color:var(--muted);

}

.shop-complete span{

    color:#60a5fa;

    font-weight:700;

}

    .completion-card{
    transition:
        transform .2s ease,
        box-shadow .2s ease;
}

.completion-card:hover{
    transform:translateY(-2px);

    box-shadow:
        0 0 20px
        rgba(59,130,246,.18);
}

.upgrade-card:hover{
    transform:translateY(-3px);
}

.upgrade-card.gems:hover{
    box-shadow:
        0 0 20px rgba(103,217,255,.18);
}

.upgrade-card.stardust:hover{
    box-shadow:
        0 0 20px rgba(181,124,255,.18);
}

.upgrade-card.rusty:hover{
    box-shadow:
        0 0 20px rgba(211,154,82,.18);
}

.upgrade-card.sturdy:hover{
    box-shadow:
        0 0 20px rgba(207,216,227,.18);
}

.upgrade-card.flawless:hover{
    box-shadow:
        0 0 20px rgba(255,216,77,.18);
}

.currency-value{

}

.dashboard-row{

    gap:12px;

    align-items:start;

}

.afk-card{

    border-color:
        rgba(181,124,255,.25);

    background:
        linear-gradient(
            135deg,
            rgba(181,124,255,.08),
            rgba(4,12,28,.65)
        );

}

    .afk-grid{

    display:grid;

}

    .afk-result{

}

    }

summary{

}

.social-links span{

    .watermark{

}

    .shop-percent{

}

    .shop-watermark{

}

<div class="container">
<img src="community_logo.png" class="logo">

<div class="social-links">

    <a
        href="https://the-everything-factory.fandom.com/wiki/The_Everything_Factory_Wiki"
        target="_blank">

        <img src="fandom.png">
        <span>Wiki</span>

    </a>

    <a
        href="https://www.reddit.com/r/TheEverythingFactory/"
        target="_blank">

        <img src="Reddit_Logo.png">
        <span>Reddit</span>

    </a>

    <a
        href="https://discord.gg/ghos"
        target="_blank">

        <img src="DiscordLogo.png">
        <span>Discord</span>

    </a>

</div>

<div class="card"><input id="search" placeholder="Search upgrades..."></div>

<div class="dashboard-row">

    <div class="card completion-card">
        <h3 class="completion-title">
            Completion Overview
        </h3>

        <div id="completion"></div>
    </div>

<div class="card afk-card">

    <h3 class="completion-title">
        ✨ AFK Calculator
    </h3>

    <div class="afk-grid">

            <div>
                <b>Stardust/Rebirth</b>
                <input id="spr" value="1" type="number">
            </div>

            <div>
                <b>Seconds/Rebirth</b>
                <input id="sec" value="1" type="number">
            </div>

            <div>
                <b>Rebirths Needed</b>
<div
    id="reb"
    class="afk-result">

    0

</div>
            </div>

            <div>
                <b>AFK Time</b>
<div
    id="afk"
    class="afk-result">

    0

</div>
            </div>

        </div>

    </div>

</div>

<div class="card progression-card">

    <h3 class="completion-title">
        🎯 Progression Assistant
    </h3>

    <div id="progressionGuide"></div>

</div>

<div
    id="totals"
    class="stats">

</div>

    <button onclick="setAllTargetsToMax()">
        Set All Targets To Max
    </button>

    <button onclick="resetProgressOnly()">
        Reset Progress
    </button>

    <button onclick="fullReset()">
        Full Reset
    </button>

const fmt = n => {

    if (n < 1000)
        return Math.round(n).toString();

    const suffixes = [
        "K","M","B","T",
        "Qa","Qi","Sx","Sp","Oc","No",

        "Dc","Ud","Dd","Td","Qad","Qid","Sxd","Spd","Ocd","Nod",

        "Vg","Uvg","Dvg","Tvg","Qavg","Qivg","Sxvg","Spvg","Ocvg","Novg",

        "Tg","Utg","Dtg","Ttg","Qatg","Qitg","Sxtg","Sptg","Octg","Notg",

        "Spg","USpg","DSpg","TSpg","QaSpg","QiSpg","SxSpg","SpSpg","OcSpg","NoSpg",

        "Ocg","UOcg","DOcg","TOcg","QaOcg","QiOcg","SxOcg","SpOcg","OcOcg","NoOcg",

        "Nog","UNog","DNog","TNog","QaNog","QiNog","SxNog","SpNog","OcNog","NoNog",

        "Ct"
    ];

    let tier =
        Math.floor(Math.log10(n) / 3) - 1;

    let scaled =
        n / Math.pow(1000, tier + 1);

    if (tier >= suffixes.length) {
        return n.toExponential(2);
    }

    return (
        scaled >= 100
            ? scaled.toFixed(0)
            : scaled >= 10
            ? scaled.toFixed(1)
            : scaled.toFixed(2)
    ) + suffixes[tier];

};

    );

    if(!u.endless){

        currencyTotals[u.cur] =
            (currencyTotals[u.cur] || 0) + c;

    }

    if(u.afk){
        afk += c;
    }

}

if(!u.endless){
    overall += s.current / u.m;
}

function toggleVariant(key){

    itemSave[key] =
        !itemSave[key];

    localStorage.setItem(
        "ef_index",
        JSON.stringify(itemSave)
    );

    renderItems();
}

function selectAllVariants(
    itemId,
    type
){

    const allChecked =
        ALL_VARIANTS.every(mut=>{

            const mutationName =
                mut.name || mut;

            const key =
                `${itemId}_${type}_${mutationName}`;

            return itemSave[key];
        });

    ALL_VARIANTS.forEach(mut=>{

        const mutationName =
            mut.name || mut;

        const key =
            `${itemId}_${type}_${mutationName}`;

        itemSave[key] =
            !allChecked;
    });

    localStorage.setItem(
        "ef_index",
        JSON.stringify(itemSave)
    );

    renderItems();

}
