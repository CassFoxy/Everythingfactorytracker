<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything Factory Tracker V2</title>
<style>
body{margin:0;background:#020817;color:#e5e7eb;font-family:Inter,Arial,sans-serif}
.container{max-width:1400px;margin:auto;padding:20px}
.card,details{background:rgba(17,24,39,.9);border-radius:16px;padding:16px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,button{padding:8px;border-radius:8px}
.bar{height:10px;background:#334155;border-radius:99px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#22c55e,#3b82f6)}
@media(max-width:768px){.grid,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>Everything Factory Tracker V2</h1>
<p>Production-ready starter with Current → Target → Max planning.</p>
<div class="card"><input id="search" placeholder="Search upgrades..." style="width:100%"></div>
<div class="card stats" id="totals"></div>
<div class="card">
<button onclick="setAllTargetsToMax()">Set All Targets To Max</button>
</div>
<div class="card stats">
<div><b>Stardust/Rebirth</b><input id="spr" value="1" type="number"></div>
<div><b>Seconds/Rebirth</b><input id="sec" value="1" type="number"></div>
<div><b>Rebirths Needed</b><div id="reb">0</div></div>
<div><b>AFK Time</b><div id="afk">0</div></div>
</div>
<div id="shops"></div>
</div>
<script>
const upgrades=[
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Dropper Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Multiplier Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Adder Mutation Boost",m:5000,f:l=>l},
{c:"Stardust Shop",cur:"Stardust",afk:true,n:"Furnace Mutation Boost",m:5000,f:l=>l},
{c:"Gem Shop",cur:"Gems",n:"Spawn Rate",m:20,f:l=>3*Math.pow(1.6,l-1)},
{c:"Gem Shop",cur:"Gems",n:"Factory Luck",m:90,f:l=>5*Math.pow(1.065,l-1)}
];
let save=JSON.parse(localStorage.getItem("efv2planner")||"{}");
function costBetween(u,a,b){let t=0;for(let i=a+1;i<=b;i++)t+=u.f(i);return t}
function fmt(n){return Math.round(n).toLocaleString()}
function render(){
 let q=(document.getElementById('search').value||'').toLowerCase();
 let grouped={};
 upgrades.forEach((u,i)=>{
   if(q && !u.n.toLowerCase().includes(q)) return;
   (grouped[u.c]??=[]).push([u,i]);
 });
 let html='';
 for(const [cat,list] of Object.entries(grouped)){
  html+=`<details open><summary>${cat}</summary><div class="grid">`;
  list.forEach(([u,i])=>{
   let s=save[i]||{current:0,target:u.m};
   let target=Math.max(s.current,Math.min(u.m,s.target));
   let toTarget=costBetween(u,s.current,target);
   let toMax=costBetween(u,s.current,u.m);
   let pct=(s.current/u.m*100).toFixed(1);
   html+=`<div class="card">
   <b>${u.n}</b><div>${u.cur}</div>
   Current <input type="number" value="${s.current}" min="0" max="${u.m}" data-f="c" data-i="${i}">
   Target <input type="number" value="${target}" min="0" max="${u.m}" data-f="t" data-i="${i}">
   <div>Max Level: ${u.m}</div>
   <div>Cost To Target: ${fmt(toTarget)}</div>
   <div>Cost To Max: ${fmt(toMax)}</div>
   <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
   <div>${pct}% Complete</div>
   <button onclick="setMax(${i})">Target = Max</button>
   </div>`;
  });
  html+='</div></details>';
 }
 document.getElementById('shops').innerHTML=html;
 document.querySelectorAll('[data-i]').forEach(el=>el.oninput=e=>{
   let i=e.target.dataset.i;
   save[i]??={current:0,target:upgrades[i].m};
   if(e.target.dataset.f==='c') save[i].current=+e.target.value;
   else save[i].target=+e.target.value;
   localStorage.setItem('efv2planner',JSON.stringify(save));
   render(); update();
 });
 update();
}
function setMax(i){save[i]??={current:0,target:0}; save[i].target=upgrades[i].m; localStorage.setItem('efv2planner',JSON.stringify(save)); render();}
function setAllTargetsToMax(){upgrades.forEach((u,i)=>{save[i]??={current:0,target:u.m}; save[i].target=u.m}); localStorage.setItem('efv2planner',JSON.stringify(save)); render();}
function update(){
 let totals={Gems:0,Stardust:0,"Rusty Scrap":0,"Sturdy Scrap":0,"Flawless Scrap":0};
 let afk=0;
 upgrades.forEach((u,i)=>{
  let s=save[i]||{current:0,target:u.m};
  let target=Math.max(s.current,Math.min(u.m,s.target));
  let cost=costBetween(u,s.current,target);
  totals[u.cur]=(totals[u.cur]||0)+cost;
  if(u.afk) afk+=cost;
 });
 document.getElementById('totals').innerHTML=Object.entries(totals).map(([k,v])=>`<div><b>${k}</b><br>${fmt(v)}</div>`).join('');
 let reb=Math.ceil(afk/((+spr.value)||1));
 reb.textContent;
 document.getElementById('reb').textContent=fmt(reb);
 let hrs=(reb*((+sec.value)||1))/3600;
 document.getElementById('afk').textContent=`${hrs.toFixed(1)} hrs`;
}
search.oninput=render; spr.oninput=update; sec.oninput=update;
render();
</script>
</body></html>
