<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything Factory Tracker V2</title>
<style>
body{font-family:Inter,Arial,sans-serif;background:#020817;color:#e5e7eb;margin:0;padding:20px}
.container{max-width:1400px;margin:auto}
.card,details{background:#111827;border-radius:16px;padding:16px;margin-bottom:12px}
summary{cursor:pointer;font-weight:bold}
input{width:100%;padding:8px;border-radius:8px;background:#0f172a;color:white;border:1px solid #475569}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.small{color:#94a3b8;font-size:.9em}
@media(max-width:768px){.grid,.statgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>Everything Factory Tracker V2</h1>

<div class="card">
<input id="search" placeholder="Search upgrades...">
</div>

<div class="card statgrid" id="totals"></div>

<div class="card statgrid">
<div><b>Stardust / Rebirth</b><input id="spr" type="number" value="1"></div>
<div><b>Seconds / Rebirth</b><input id="sec" type="number" value="1"></div>
<div><b>Rebirths Needed</b><div id="rebirths">0</div></div>
<div><b>AFK Time</b><div id="afktime">0</div></div>
</div>

<div id="shops"></div>
</div>

<script>
const upgradesData = [
{category:"Gem Shop",currency:"Gems",name:"Spawn Rate",max:20,formula:l=>3*Math.pow(1.6,l-1)},
{category:"Gem Shop",currency:"Gems",name:"Factory Luck",max:90,formula:l=>5*Math.pow(1.065,l-1)},
{category:"Gem Shop",currency:"Gems",name:"Mutation Rate",max:20,formula:l=>5*Math.pow(1.4,l-1)},
{category:"Gem Shop",currency:"Gems",name:"Mutation Luck",max:150,formula:l=>3*Math.pow(1.0568,l-1)},
{category:"Gem Shop",currency:"Gems",name:"Ore Limit",max:25,formula:l=>5*Math.pow(1.5,l-1)},
{category:"Gem Shop",currency:"Gems",name:"Furnace Bank Size",max:45,formula:l=>5*Math.pow(1.15,l-1)},
{category:"Gem Shop",currency:"Gems",name:"Offline Earnings",max:20,formula:l=>15*Math.pow(1.3,l-1)},
{category:"Stardust Shop",currency:"Stardust",name:"Gem Chance",max:40,formula:l=>2*l},
{category:"Stardust Shop",currency:"Stardust",name:"More Mutation Luck",max:75,formula:l=>{let c=5;for(let i=2;i<=l;i++)c+=Math.ceil(i/10);return c;}},
{category:"Stardust Shop",currency:"Stardust",name:"Plot Size",max:10,formula:l=>6*l},
{category:"Stardust Shop",currency:"Stardust",name:"Walk Speed",max:20,formula:l=>l},
{category:"Stardust Shop",currency:"Stardust",name:"Level Preservation",max:25,formula:l=>2*l*l},
{category:"Stardust Shop",currency:"Stardust",name:"Extra Permanent Pick",max:1,formula:()=>1000},
{category:"Stardust Shop",currency:"Stardust",name:"Scrap Boost",max:20,formula:l=>50*Math.pow(1.475,l-1)},
{category:"Stardust Shop",currency:"Stardust",afk:true,name:"Dropper Mutation Boost",max:5000,formula:l=>l},
{category:"Stardust Shop",currency:"Stardust",afk:true,name:"Multiplier Mutation Boost",max:5000,formula:l=>l},
{category:"Stardust Shop",currency:"Stardust",afk:true,name:"Adder Mutation Boost",max:5000,formula:l=>l},
{category:"Stardust Shop",currency:"Stardust",afk:true,name:"Furnace Mutation Boost",max:5000,formula:l=>l}
];

let save=JSON.parse(localStorage.getItem("ef_v2"))||{};

function cum(up,l){let t=0;for(let i=1;i<=l;i++)t+=up.formula(i);return t;}
function fmtTime(s){const h=s/3600; let d=Math.floor(s/86400); s%=86400; let hr=Math.floor(s/3600); let m=Math.floor((s%3600)/60); return `${d?d+"d ":""}${hr}h ${m}m (${h.toLocaleString(undefined,{maximumFractionDigits:1})} hrs)`}

function render(){
const shops=document.getElementById("shops");
shops.innerHTML="";
const q=document.getElementById("search").value.toLowerCase();

const grouped={};
upgradesData.forEach((u,i)=>{
 if(q && !u.name.toLowerCase().includes(q)) return;
 grouped[u.category]??=[];
 grouped[u.category].push([u,i]);
});

for(const [cat,list] of Object.entries(grouped)){
 const d=document.createElement("details");
 d.open=true;
 d.innerHTML=`<summary>${cat}</summary><div class="grid" id="g_${cat}"></div>`;
 shops.appendChild(d);
 const g=d.querySelector("div");
 list.forEach(([u,i])=>{
  const lvl=save[i]||0;
  const rem=(cum(u,u.max)-cum(u,lvl)).toFixed(0);
  g.innerHTML+=`<div class="card"><b>${u.name}</b><div class="small">${u.currency}</div>
  <input type="number" min="0" max="${u.max}" value="${lvl}" data-i="${i}">
  <div>Max: ${u.max}</div><div>Remaining: ${Number(rem).toLocaleString()}</div></div>`;
 });
}
document.querySelectorAll("[data-i]").forEach(el=>el.oninput=e=>{save[e.target.dataset.i]=+e.target.value;localStorage.setItem("ef_v2",JSON.stringify(save));update();});
update();
}

function update(){
const totals={"Gems":0,"Stardust":0,"Rusty Scrap":0,"Sturdy Scrap":0,"Flawless Scrap":0};
let afkStardust=0;

upgradesData.forEach((u,i)=>{
 const lvl=save[i]||0;
 const rem=cum(u,u.max)-cum(u,lvl);
 if(typeof u.currency==="string"){
   totals[u.currency]=(totals[u.currency]||0)+rem;
 }
 if(u.afk) afkStardust+=rem;
});

document.getElementById("totals").innerHTML=Object.entries(totals).map(([k,v])=>`<div><b>${k}</b><div>${Math.round(v).toLocaleString()}</div></div>`).join("");

const spr=+document.getElementById("spr").value||1;
const sec=+document.getElementById("sec").value||1;
const reb=Math.ceil(afkStardust/spr);
document.getElementById("rebirths").textContent=reb.toLocaleString();
document.getElementById("afktime").textContent=fmtTime(reb*sec);
}

document.getElementById("search").oninput=render;
document.getElementById("spr").oninput=update;
document.getElementById("sec").oninput=update;
render();
</script>
</body>
</html>
