<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything Factory Tracker</title>
<link rel="icon" type="image/png" href="logo(5).png">
<style>
:root{
 --bg:#0b1220;--card:#111827;--card2:#1f2937;--text:#e5e7eb;
 --muted:#94a3b8;--accent:#3b82f6;--good:#22c55e;
}
*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,Segoe UI,Arial,sans-serif;
color:var(--text);
background:#020817;
overflow-x:hidden;
min-height:100vh;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:-50px;
background-image:url("new_goated_thumbnail.png");
filter:blur(8px);
transform:scale(1.05);
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:rgba(2,8,20,0.75);
z-index:-1;
}

.container{max-width:1200px;margin:auto;padding:24px}
.hero{text-align:center;margin-bottom:30px}

.logo{
width:min(850px,95vw);
height:auto;
display:block;
margin:0 auto;
filter:
drop-shadow(0 0 15px rgba(0,180,255,.4))
drop-shadow(0 0 45px rgba(0,180,255,.25));
}
 
.hero{
position:relative;
text-align:center;
margin-bottom:30px;
}

.hero::before{
content:"";
position:absolute;
left:50%;
top:180px;
transform:translateX(-50%);
width:700px;
height:700px;
border-radius:50%;
background:radial-gradient(
circle,
rgba(0,180,255,.45),
rgba(0,180,255,.15),
transparent 70%
);
filter:blur(80px);
z-index:-1;
}
 
.hero p{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}

.card{
background:rgba(4,12,28,.55);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:20px;
box-shadow:0 10px 40px rgba(0,0,0,.45);
transition:.25s;
}
.card:hover{transform:translateY(-4px);}

input{width:100%;padding:10px;border-radius:10px;border:1px solid #475569;background:#0f172a;color:white}
.bar{height:16px;background:#334155;border-radius:999px;overflow:hidden;margin-top:10px}
.fill{height:100%;background:linear-gradient(90deg,var(--good),var(--accent));width:0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:20px}
.stat{background:var(--card2);padding:14px;border-radius:14px}
button{padding:10px 14px;border:none;border-radius:10px;background:var(--accent);color:white;cursor:pointer}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
#overallCard{background:rgba(4,12,28,.65);backdrop-filter:blur(18px);border-radius:24px;}
.actions button{padding:14px 24px;font-size:16px;font-weight:600;}
.actions button:nth-child(1){background:linear-gradient(135deg,#0d6efd,#2563eb);}
.actions button:nth-child(2){background:linear-gradient(135deg,#6d28d9,#9333ea);}
.actions button:nth-child(3){background:#111827;}
small{color:var(--muted)}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<img src="community_logo.png" alt="Everything Factory Logo" class="logo">
<p style="font-size:1.35rem;color:#dbeafe;margin-top:10px;margin-bottom:30px;">Track Stardust Upgrades</p>
</div>

<div class="grid" id="upgrades"></div>

<div class="card" id="overallCard" style="margin-top:20px">
<h2>Overall Progress</h2>
<div class="bar"><div class="fill" id="overallBar"></div></div>
<h3 id="overallText"></h3>

<div class="stats">
<div class="stat"><strong>Spent</strong><div id="spent"></div></div>
<div class="stat"><strong>Required</strong><div id="required"></div></div>
<div class="stat"><strong>Remaining</strong><div id="remaining"></div></div>
<div class="stat"><strong>Completion</strong><div id="completion"></div></div>
</div>

<div class="actions">
<button onclick="exportData()">Export Save</button>
<button onclick="importData()">Import Save</button>
<button onclick="resetData()">Reset</button>
</div>
<small>Your progress is automatically saved in your browser.</small>
</div>
</div>
 
<script>
const defaults=[
{name:"Dropper",now:1,max:5000},
{name:"Multiplier",now:1,max:5000},
{name:"Adder",now:1,max:5000},
{name:"Furnace",now:1,max:5000}
];
function tri(n){return n*(n+1)/2;}
let items=JSON.parse(localStorage.getItem("eftracker_data")||"null") || defaults;
const upgrades=document.getElementById("upgrades");
function render(){
upgrades.innerHTML="";
items.forEach((item,i)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<h3>${item.name}</h3>
<label>Current Level</label>
<input type="number" id="now${i}" value="${item.now}">
<label>Max Level</label>
<input type="number" id="max${i}" value="${item.max}">
<div class="bar"><div class="fill" id="bar${i}"></div></div>
<p id="pct${i}"></p>`;
upgrades.appendChild(div);
});
update();
}
function update(){
let spent=0,req=0;
items.forEach((item,i)=>{
item.now=+document.getElementById(`now${i}`).value;
item.max=+document.getElementById(`max${i}`).value;
spent+=tri(item.now); req+=tri(item.max);
let pct=Math.min(100,(item.now/item.max)*100);
document.getElementById(`bar${i}`).style.width=pct+"%";
document.getElementById(`pct${i}`).textContent=pct.toFixed(2)+"% Complete";
});
const remaining=req-spent;
const overall=req?spent/req*100:0;
document.getElementById("overallBar").style.width=overall+"%";
document.getElementById("overallText").textContent=overall.toFixed(2)+"% Complete";
document.getElementById("spent").textContent=spent.toLocaleString();
document.getElementById("required").textContent=req.toLocaleString();
document.getElementById("remaining").textContent=remaining.toLocaleString();
document.getElementById("completion").textContent=overall.toFixed(2)+"%";
localStorage.setItem("eftracker_data",JSON.stringify(items));
}
document.addEventListener("input",update);
function exportData(){const blob=new Blob([JSON.stringify(items,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="eftracker-save.json";a.click();}
function importData(){const input=document.createElement("input");input.type="file";input.accept=".json";input.onchange=e=>{const file=e.target.files[0];const reader=new FileReader();reader.onload=()=>{items=JSON.parse(reader.result);render();};reader.readAsText(file);};input.click();}
function resetData(){localStorage.removeItem("eftracker_data");items=structuredClone(defaults);render();}
render();
</script>
 
 <footer class="watermark">
    Created by CassFoxy • Everything Factory Tracker
</footer>
 
</body>
</html>
