<!DOCTYPE html>
<html>
<head>
    <title>Everything Factory Incremental</title>

    <style>
        body{
            background:#020817;
            color:white;
            font-family:Arial,sans-serif;
            text-align:center;
            padding:30px;
        }

        .card{
            background:#0f172a;
            border:1px solid #334155;
            border-radius:12px;
            padding:20px;
            margin:20px auto;
            max-width:500px;
        }

        button{
            padding:12px 20px;
            font-size:18px;
            cursor:pointer;
            border-radius:8px;
        }
    </style>
</head>

<body>

<h1>🏭 Everything Factory Incremental</h1>

<div class="card">

    <h2>Cash</h2>

    <div id="cash">0</div>

    <div>
        CPS:
        <span id="cps">0</span>
    </div>

</div>

<div class="card">

    <button id="mineButton">
        ⛏ Produce Ore
    </button>

</div>

<div class="card">

    <h2>Dropper</h2>

    <div>
        Owned:
        <span id="droppers">0</span>
    </div>

    <div>
        Cost:
        <span id="dropperCost">10</span>
    </div>

    <button id="buyDropper">
        Buy Dropper
    </button>

</div>

      <script>

    let save = JSON.parse(
        localStorage.getItem("ef_incremental")
    ) || {
        cash: 0,
        droppers: 0
    };

    function saveGame(){
        localStorage.setItem(
            "ef_incremental",
            JSON.stringify(save)
        );
    }

    function getDropperCost(){
        return Math.floor(
            10 * Math.pow(1.15, save.droppers)
        );
    }

    function getCPS(){
        return save.droppers;
    }

    function updateUI(){

        document.getElementById("cash").textContent =
            Math.floor(save.cash);

        document.getElementById("cps").textContent =
            getCPS();

        document.getElementById("droppers").textContent =
            save.droppers;

        document.getElementById("dropperCost").textContent =
            getDropperCost();

    }

    document.getElementById("mineButton")
        .onclick = function(){

        save.cash += 1;

        updateUI();

    };

    document.getElementById("buyDropper")
        .onclick = function(){

        const cost =
            getDropperCost();

        if(save.cash < cost)
            return;

        save.cash -= cost;

        save.droppers++;

        updateUI();

    };

    setInterval(function(){

        save.cash += getCPS() / 10;

        updateUI();

    }, 100);

    setInterval(saveGame, 5000);

    updateUI();

    </script>

</body>
</html>
